name: CI
on:
  push:
    branches: [main, wayland-compositor-qajb]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;28.0.13004108"
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-
      - name: Build
        run: ./gradlew assembleDebug -PskipCompositor=true -PskipProot=true -PskipVirgl=true -PskipShims=true

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;28.0.13004108"
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-
      - name: Run unit tests
        run: ./gradlew test -PskipCompositor=true -PskipProot=true -PskipVirgl=true -PskipShims=true
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests/'

  native-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Meson + Ninja
        run: pip3 install meson ninja
      - name: Install native deps
        run: sudo apt-get update && sudo apt-get install -y libwayland-dev wayland-protocols libdrm-dev libxkbcommon-dev
      - name: Setup Meson subprojects
        run: bash scripts/setup-meson-subprojects.sh
      - name: Build and test compositor (host)
        run: |
          cd compositor/native
          # Create a wayland-scanner .pc override so Meson's
          # dependency('wayland-scanner', native: true, version: '>=1.23.1')
          # accepts the system scanner (Ubuntu ships 1.22.0, too old for the check).
          SCANNER_BIN="$(which wayland-scanner)"
          SCANNER_PC_DIR="$(mktemp -d)"
          cat > "$SCANNER_PC_DIR/wayland-scanner.pc" <<PCEOF
          wayland_scanner=$SCANNER_BIN

          Name: wayland-scanner
          Description: Wayland scanner (pkg-config override)
          Version: 1.24.0
          PCEOF
          # Use a native file so Meson reliably finds the .pc override
          # (env var PKG_CONFIG_PATH is not always inherited in all modes).
          NATIVE_FILE="$(mktemp)"
          cat > "$NATIVE_FILE" <<NEOF
          [binaries]
          wayland-scanner = '$SCANNER_BIN'

          [built-in options]
          pkg_config_path = ['$SCANNER_PC_DIR']
          NEOF
          # Disable renderers and backends — host tests don't need EGL/GPU
          meson setup builddir --native-file "$NATIVE_FILE" --wrap-mode=forcefallback -Dwlroots:renderers= -Dwlroots:backends=
          meson test -C builddir --print-errorlogs --suite wldroid-compositor
      - name: Build and test GBM shim (host)
        run: |
          cd shims/native/gbm-shim
          meson setup builddir -Dtests=true
          meson test -C builddir --print-errorlogs

      - name: Setup Android SDK + NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;28.0.13004108"
      - name: Validate cross-compile meson setup
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/28.0.13004108"
          cd compositor/native
          bash scripts/build.sh --setup-only

  emulator-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4
      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-29
      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."
      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-snapshot-save
          disable-animations: true
          script: ./gradlew connectedAndroidTest -PskipCompositor=true -PskipProot=true -PskipVirgl=true -PskipShims=true
      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: '**/build/reports/androidTests/'
