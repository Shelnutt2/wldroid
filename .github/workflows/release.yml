name: Release
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Setup Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;28.0.13004108"
      - name: Run unit tests
        run: ./gradlew test -PskipCompositor=true -PskipProot=true -PskipVirgl=true -PskipShims=true

  build-and-publish:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          clean: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Setup Android SDK + NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;28.0.13004108"
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libwayland-dev \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu
          pip3 install meson
      - name: Cache native build outputs
        uses: actions/cache@v4
        with:
          path: |
            compositor/native/builddir-cross/
            virgl/native/builddir/
          key: native-${{ hashFiles('external/**/.git', 'compositor/native/**', 'virgl/native/**', 'shims/native/**') }}
          restore-keys: native-
      - name: Setup Meson subprojects
        run: bash scripts/setup-meson-subprojects.sh
      - name: Build all native components
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/28.0.13004108"
          bash scripts/build-all-native.sh
      - name: Restore clean git state after native build
        run: |
          # Native builds (meson) modify tracked files like .wraplock.
          # The palantir git-version plugin uses `git status --porcelain`
          # to detect dirty state and appends '.dirty' to the version.
          # Restore any tracked files modified by native builds.
          git checkout -- .
          DIRTY=$(git status --porcelain)
          if [ -n "$DIRTY" ]; then
            echo "WARNING: Untracked files present (should be gitignored):"
            echo "$DIRTY"
          fi
          VERSION=$(./gradlew -q printVersion 2>/dev/null || true)
          echo "Resolved version: $VERSION"
          if echo "$VERSION" | grep -qi dirty; then
            echo "ERROR: Version still contains 'dirty' suffix after cleanup."
            echo "Untracked/modified state:"
            git status --porcelain
            exit 1
          fi
      - name: Build release AARs
        run: ./gradlew assembleRelease -PskipCompositor=true -PskipProot=true -PskipVirgl=true -PskipShims=true
      - name: Publish to GitHub Packages
        run: ./gradlew publish -PskipCompositor=true -PskipProot=true -PskipVirgl=true -PskipShims=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to filesystem Maven repo
        run: |
          ./gradlew publishAllPublicationsToFileSystemMavenRepoRepository \
            -PskipCompositor=true -PskipProot=true -PskipVirgl=true -PskipShims=true
      - name: Collect AARs
        run: |
          mkdir -p release-artifacts
          missing=()
          for module in compositor proot virgl shims ui launcher; do
            aar=$(find "$module/build/outputs/aar/" -name "*-release.aar" 2>/dev/null | head -1)
            if [ -n "$aar" ]; then
              cp "$aar" "release-artifacts/${module}-release.aar"
              echo "Collected: ${module}-release.aar"
            else
              echo "WARNING: No release AAR found for $module"
              missing+=("$module")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: Missing required AARs: ${missing[*]}"
            exit 1
          fi
      - name: Package Maven repo zip
        run: |
          cd build/maven-repo
          zip -r ../../release-artifacts/wldroid-maven-repo.zip .
          cd ../..
          echo "Maven repo contents:"
          find build/maven-repo -type f | sort
      - name: Generate checksums
        run: |
          cd release-artifacts
          sha256sum *.aar wldroid-maven-repo.zip > checksums-sha256.txt
          echo "Checksums:"
          cat checksums-sha256.txt
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts/

  create-release:
    runs-on: ubuntu-latest
    needs: [build-and-publish]
    steps:
      - uses: actions/checkout@v4
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/*.aar
            release-artifacts/wldroid-maven-repo.zip
            release-artifacts/checksums-sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
