name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;28.0.13004108"
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-
      - name: Run unit tests
        run: ./gradlew test -PskipCompositor=true -PskipProot=true -PskipVirgl=true -PskipShims=true

  build-release:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;28.0.13004108"
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-
      - name: Build release AARs
        run: ./gradlew :compositor:assembleRelease :proot:assembleRelease :virgl:assembleRelease :shims:assembleRelease :ui:assembleRelease -PskipCompositor=true -PskipProot=true -PskipVirgl=true -PskipShims=true
      - name: Collect AARs
        run: |
          mkdir -p release-artifacts
          cp compositor/build/outputs/aar/*-release.aar release-artifacts/compositor-release.aar || true
          cp proot/build/outputs/aar/*-release.aar release-artifacts/proot-release.aar || true
          cp virgl/build/outputs/aar/*-release.aar release-artifacts/virgl-release.aar || true
          cp shims/build/outputs/aar/*-release.aar release-artifacts/shims-release.aar || true
          cp ui/build/outputs/aar/*-release.aar release-artifacts/ui-release.aar || true
      - name: Upload AAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-aars
          path: release-artifacts/

  create-release:
    runs-on: ubuntu-latest
    needs: [build-release]
    steps:
      - uses: actions/checkout@v4
      - name: Download AARs
        uses: actions/download-artifact@v4
        with:
          name: release-aars
          path: release-artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/*.aar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
