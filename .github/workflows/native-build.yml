name: Native Build
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'compositor/native/**'
      - 'shims/native/**'
      - 'virgl/native/**'
      - 'external/**'
  pull_request:
    branches: [main]
    paths:
      - 'compositor/native/**'
      - 'shims/native/**'
      - 'virgl/native/**'
      - 'external/**'

concurrency:
  group: native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compositor-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;28.0.13004108"
      - name: Install Meson + Ninja
        run: pip3 install meson ninja
      - name: Install native deps
        run: sudo apt-get update && sudo apt-get install -y libwayland-dev
      - name: Setup Meson subprojects
        run: bash scripts/setup-meson-subprojects.sh
      - name: Cross-compile compositor for ARM64
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/28.0.13004108"
          cd compositor/native
          bash scripts/build.sh
      - name: Upload compositor .so
        uses: actions/upload-artifact@v4
        with:
          name: compositor-arm64
          path: compositor/native/builddir-arm64/**/*.so

  virgl-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;28.0.13004108"
      - name: Install Meson + Ninja
        run: pip3 install meson ninja
      - name: Cross-compile VirGL for ARM64
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/28.0.13004108"
          bash virgl/native/build-virgl.sh
      - name: Upload VirGL binaries
        uses: actions/upload-artifact@v4
        with:
          name: virgl-arm64
          path: |
            virgl/native/**/virgl_test_server
            virgl/native/**/*.so

  shims-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build shims via Docker
        run: |
          if [ -f shims/native/Dockerfile ]; then
            cd shims/native
            docker build -t wldroid-shims .
            docker create --name shim-extract wldroid-shims
            mkdir -p output
            docker cp shim-extract:/output/. output/ || true
            docker rm shim-extract
          else
            echo "No Dockerfile found, building with Meson"
            pip3 install meson ninja
            for shim_dir in shims/native/*/; do
              if [ -f "$shim_dir/meson.build" ]; then
                echo "Building $(basename $shim_dir)"
                cd "$shim_dir"
                meson setup builddir --buildtype release || true
                ninja -C builddir || true
                cd -
              fi
            done
          fi
      - name: Upload shim .so files
        uses: actions/upload-artifact@v4
        with:
          name: shims-aarch64
          path: |
            shims/native/**/builddir/**/*.so
            shims/native/**/builddir/**/*.so.*
            shims/native/output/**
